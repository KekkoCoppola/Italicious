<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italicious - Accedi</title>
    <link rel="icon" type="image/png" href="img/loghi/logo_top.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen font-sans">

<div class="container mx-auto px-4 py-8 max-w-md w-full">
    <div class="text-center mb-8">
        <a href="index.html" class="inline-block">
            <img src="img/loghi/logo.png" alt="Italicious Logo" class="h-16 object-contain mx-auto">
        </a>
        <h2 class="text-3xl font-extrabold text-gray-900 mt-6">Bentornato!</h2>
        <p class="mt-2 text-sm text-gray-600">
            Oppure
            <a href="#" class="font-medium text-green-600 hover:text-green-500 transition">
                crea un nuovo account (Demo)
            </a>
        </p>
    </div>

    <div class="bg-white py-8 px-6 shadow-xl rounded-xl border border-gray-100 sm:px-10 relative overflow-hidden">
        <!-- Decoration line -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-green-500 via-white to-red-500"></div>
        
        <form class="space-y-6" onsubmit="event.preventDefault(); window.location.href='index.html';">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Indirizzo Email</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-gray-400"></i>
                    </div>
                    <input id="email" name="email" type="email" autocomplete="email" required
                        class="focus:ring-green-500 focus:border-green-500 block w-full pl-10 py-3 sm:text-sm border-gray-300 rounded-lg border bg-gray-50 outline-none transition"
                        placeholder="tuo@email.com">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input id="password" name="password" type="password" autocomplete="current-password" required
                        class="focus:ring-green-500 focus:border-green-500 block w-full pl-10 py-3 sm:text-sm border-gray-300 rounded-lg border bg-gray-50 outline-none transition"
                        placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded cursor-pointer">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-900 cursor-pointer">
                        Ricordami
                    </label>
                </div>

                <div class="text-sm">
                    <a href="#" class="font-medium text-green-600 hover:text-green-500 transition">
                        Password dimenticata?
                    </a>
                </div>
            </div>

            <div>
                <button type="submit"
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-green-600 flex items-center justify-center shadow transition transform hover:-translate-y-0.5 mt-4">
                    <i class="fas fa-sign-in-alt mr-2"></i> Accedi
                </button>
            </div>
            
            <div class="mt-6 text-center text-xs text-gray-500 border-t border-gray-100 pt-6">
                Pagina statica dimostrativa per GitHub Pages
            </div>
        </form>
    </div>
</div>

</body>
</html>
