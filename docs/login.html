<!-- BANNER DEMO -->
<div class="fixed bottom-0 left-0 w-full bg-red-600/90 backdrop-blur text-white text-center py-3 z-[10000] font-bold shadow-lg text-sm sm:text-base tracking-wide border-t-4 border-red-700">
    🚨 AREA DEMO: Questa è una versione dimostrativa statica. I dati sono mockati e le funzionalità limitate. 🚨
</div>
<!-- FINE BANNER DEMO -->
<script>
    function mostraNotifica(testo, colore = "#333") {
      const notifica = document.getElementById("notifica");
      notifica.style.backgroundColor = colore;
      notifica.innerText = testo;
      notifica.style.display = "block";
      setTimeout(() => {
        notifica.style.display = "none";
      }, 3000);
    }

    const profileBtn = document.getElementById('profileBtn');
    const profileMenu = document.getElementById('profileMenu');
    const mobileBtn  = document.getElementById('mobile-menu-button');
    const mobileMenu = document.getElementById('mobile-menu');

    profileBtn.addEventListener('click', function(e) {
        e.preventDefault();
        profileMenu.classList.toggle('show');
    });

    document.addEventListener('click', function(e) {
        // Chiudi menu profilo
        if (!profileBtn.contains(e.target) && !profileMenu.contains(e.target)) {
            profileMenu.classList.remove('show');
        }
        // Chiudi menu mobile se clicco fuori
        if (!mobileBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
            mobileMenu.classList.add('hidden');
        }
    });

    mobileBtn.addEventListener('click', function () {
      mobileMenu.classList.toggle('hidden');
    });
</script>

<script>
//MOSTRA NASCONDI NELLA PASSWORD
	var card = document.getElementById("card");
	var passInput = document.getElementById("password");
	var showbtn = document.getElementById("showbtn");
	var occhi =document.getElementById("blind-check");
	
	passInput.addEventListener("focus", () => {
		  if (passInput.type === "password") {
		    document.getElementById("blind-check").checked = true;
		  }
		});
	passInput.addEventListener("blur", () => {
		  if (passInput.type === "password") {
		    document.getElementById("blind-check").checked = false;
		  }
		});
	
	function hide(){
		if (passInput.type === "password") {
			passInput.type = "text";
			showbtn.textContent = "Nascondi";
			occhi.checked=false;
		    } else {
		    	passInput.type = "password";
		    	showbtn.textContent = "Mostra";
		    	occhi.checked=true;
		    }
	}
	
	
  document.addEventListener("DOMContentLoaded", function () {
    const toggleCheckbox = document.getElementById("blind-input");
    const passwordInput = document.getElementById("password");

    toggleCheckbox.addEventListener("input", function () {
    
      passwordInput.type = this.checked ? "text" : "password";
      passwordInput.focus();
      passwordInput.setSelectionRange(passwordInput.value.length, passwordInput.value.length);
    
    });
  });
  //NOTIFICA
  function mostraNotifica(testo, colore = "#333") {
	  const notifica = document.getElementById("notifica");
	  notifica.style.backgroundColor = colore;
	  notifica.innerText = testo;
	  notifica.style.display = "block";
	  setTimeout(() => {
	    notifica.style.display = "none";
	  }, 3000);
	}
  
</script>
